<ion-header>
    <ion-toolbar [ngStyle]="{ 'padding-top': device_details?.platform === 'ios' ? 'var(--ion-safe-area-top, 0)' : '0' }">
      <ion-buttons slot="start">
        <ion-button (click)="onDismiss()" color="medium">
          <ion-icon name="close" slot="icon-only"></ion-icon>
        </ion-button>
      </ion-buttons>
      <ion-title class="ion-text-center">Add Emails</ion-title>
    </ion-toolbar>
</ion-header>

<ion-content>
  <form [formGroup]="emailForm" (ngSubmit)="onSubmit()">
    <ion-radio-group [value]="selectedRadio" (ionChange)="selectRadio($event)">
      <ion-row style="margin: 5% 10%">
        <ion-col size="6">
          <ion-radio value="printer" mode="md" labelPlacement="end" [ngStyle]="{ opacity: selectedRadio === 'printer' ? '1' : '0.75' }">Printer Friendly</ion-radio>
        </ion-col>
        <ion-col size="6">
          <ion-radio value="digital" mode="md" labelPlacement="end" [ngStyle]="{ opacity: selectedRadio === 'digital' ? '1' : '0.75' }">Digital Edition</ion-radio>
        </ion-col>
      </ion-row>
    </ion-radio-group>
    <ion-list class="ion-padding ion-margin-top" formArrayName="emails">
      <ion-item lines="none" class="input ion-margin-bottom" *ngFor="let email of emails.controls; let i = index" [formGroupName]="i">
        <ion-label>Email</ion-label>
        <ion-input type="email" formControlName="email" placeholder="Enter email"></ion-input>
        <ion-icon name="trash" color="danger" (click)="delete(i)" *ngIf="emails.length > 1"></ion-icon>
      </ion-item>
    </ion-list>

    <ion-row>
      <ion-col size="12" class="ion-text-center">
        <ion-button fill="outline" shape="round" class="btn-w120" type="submit" [disabled]="!emailForm.valid">Send Report</ion-button>
      </ion-col>
    </ion-row>
  </form>
</ion-content>

<ion-fab vertical="bottom" horizontal="end" slot="fixed">
  <ion-fab-button (click)="addGuest()">
    <ion-icon name="add"></ion-icon>
  </ion-fab-button>
</ion-fab>
