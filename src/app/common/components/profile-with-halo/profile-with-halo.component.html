<div class="profile-halo-wrapper" [class.gradient-border]="props?.enableGradientBorder" [ngStyle]="{'width': props?.width, 'height': props?.height}">
  <img [src]="user?.profile_details.avatar" [style.width]="props?.width" [style.height]="props?.height" style="border-radius: 50%; object-fit: cover;" />
</div>
